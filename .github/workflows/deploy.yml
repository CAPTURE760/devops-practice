name: Deploy to Server

on:
  push:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          chmod +x test.sh
          ./test.sh

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/deploy/devops-staging
            git pull origin dev
            sudo docker build -t devops-staging:latest .
            sudo docker stop devops-staging 2>/dev/null || true
            sudo docker rm devops-staging 2>/dev/null || true
            sudo docker run -d --name devops-staging -p 8082:80 --restart unless-stopped devops-staging:latest

  deploy-production:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/deploy/devops-practice
            git pull origin main
            sudo docker build -t devops-app:latest .
            sudo docker stop devops-app 2>/dev/null || true
            sudo docker rm devops-app 2>/dev/null || true
            sudo docker run -d --name devops-app -p 8081:80 --restart unless-stopped devops-app:latest
