name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. SSH 登录服务器执行部署
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GH_TOKEN
          script: |
            cd /home/deploy/devops-practice
            git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/CAPTURE760/devops-practice.git
            git pull origin main
            sudo docker build -t devops-app:latest .
            sudo docker stop devops-app 2>/dev/null || true
            sudo docker rm devops-app 2>/dev/null || true
            sudo docker run -d \
              --name devops-app \
              -p 8081:80 \
              --restart unless-stopped \
              devops-app:latest