name: Deploy to Server

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      environment:
        description: '选择要回滚的环境'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: ACTIONS_ID_TOKEN_REQUEST_TOKEN,ACTIONS_ID_TOKEN_REQUEST_URL
          script: |
            cd /home/deploy/devops-staging
            git fetch origin
            git checkout dev
            git pull origin dev
            BACKUP_TIME=$(date +%Y%m%d_%H%M%S)
            sudo docker compose pull 2>/dev/null || true
            sudo docker compose build --pull
            sudo docker compose up -d
            sudo docker image prune -f
            echo "✅ Staging 部署完成: $(date)"

      - name: Health Check (Staging)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sleep 10
            RESP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/api/system/status || echo "000")
            if [ "$RESP" = "200" ]; then
              echo "✅ Staging 健康检查通过 (HTTP $RESP)"
            else
              echo "❌ Staging 健康检查失败 (HTTP $RESP)"
              exit 1
            fi

      - name: Notify
        if: always()
        run: |
          MSG="✅ Staging 部署成功" && [ "${{ job.status }}" != "success" ] && MSG="❌ Staging 部署失败"
          curl -s -m 10 -X POST "${{ secrets.QYWX_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$MSG\n分支: dev\n提交: ${{ github.sha }}\n链接: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}}" || true

  deploy-production:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: ACTIONS_ID_TOKEN_REQUEST_TOKEN,ACTIONS_ID_TOKEN_REQUEST_URL
          script: |
            cd /home/deploy/devops-practice
            git fetch origin
            git checkout main
            git pull origin main
            BACKUP_TIME=$(date +%Y%m%d_%H%M%S)
            
            # 显示当前容器状态
            echo "=== 部署前容器状态 ==="
            sudo docker ps -a || true
            echo ""
            
            # 停止旧容器
            echo "=== 停止旧容器 ==="
            sudo docker stop ai-ops-app ai-ops-nginx devops-app devops-staging 2>/dev/null || true
            sudo docker rm ai-ops-app ai-ops-nginx devops-app devops-staging 2>/dev/null || true
            
            # 构建新镜像（显示详细输出）
            echo "=== 开始构建 ==="
            sudo docker compose build --no-cache
            echo "构建完成"
            
            # 启动容器
            echo "=== 启动容器 ==="
            sudo docker compose up -d
            sleep 5
            
            # 显示容器状态
            echo "=== 容器状态 ==="
            sudo docker ps -a
            sudo docker compose ps
            
            # 显示日志（排查问题）
            echo "=== 应用日志 ==="
            sudo docker compose logs --tail=20 app nginx
            
            echo "=== 部署完成 ==="

      - name: Health Check (Production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "等待服务启动..."
            sleep 15
            
            # 检查端口
            echo "=== 端口检查 ==="
            sudo netstat -tlnp | grep -E "8081|8000" || echo "端口未监听"
            
            # 尝试直接访问 FastAPI (8000)
            echo "=== 直接访问 FastAPI (8000) ==="
            RESP0=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
            echo "HTTP $RESP0"
            
            # 访问 nginx (8081)
            echo "=== 访问 nginx (8081) ==="
            RESP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/api/system/status || echo "000")
            echo "HTTP $RESP"
            
            # 显示完整响应（调试用）
            if [ "$RESP" = "200" ]; then
              echo "✅ Production 健康检查通过 (HTTP $RESP)"
            else
              echo "❌ Production 健康检查失败 (HTTP $RESP)"
              echo "=== 调试: nginx 容器日志 ==="
              sudo docker logs ai-ops-nginx --tail=10 || true
              echo "=== 调试: app 容器日志 ==="
              sudo docker logs ai-ops-app --tail=10 || true
              exit 1
            fi

      - name: Notify
        if: always()
        run: |
          MSG="✅ Production 部署成功" && [ "${{ job.status }}" != "success" ] && MSG="❌ Production 部署失败"
          curl -s -m 10 -X POST "${{ secrets.QYWX_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$MSG\n分支: main\n提交: ${{ github.sha }}\n链接: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}}" || true

  rollback:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            if [ "${{ github.event.inputs.environment }}" = "staging" ]; then
              cd /home/deploy/devops-staging
              IMG=$(sudo docker images --format "{{.Repository}}:{{.Tag}}" | grep "_app:backup_" | head -1)
              [ -z "$IMG" ] && echo "❌ 没有备份镜像" && exit 1
              echo "回滚到: $IMG"
              sudo docker compose down
              sudo docker tag "$IMG" devops-app_app:latest
              sudo docker compose up -d
              echo "✅ Staging 回滚成功"
            else
              cd /home/deploy/devops-practice
              IMG=$(sudo docker images --format "{{.Repository}}:{{.Tag}}" | grep "_app:backup_" | head -1)
              [ -z "$IMG" ] && echo "❌ 没有备份镜像" && exit 1
              echo "回滚到: $IMG"
              sudo docker compose down
              sudo docker tag "$IMG" devops-app_app:latest
              sudo docker compose up -d
              echo "✅ Production 回滚成功"
            fi

      - name: Notify Rollback
        if: always()
        run: |
          curl -s -m 10 -X POST "${{ secrets.QYWX_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"🔄 手动回滚完成\n环境: ${{ github.event.inputs.environment }}\n操作人: ${{ github.actor }}\"}}" || true
